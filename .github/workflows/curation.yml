name: BugSigDB Cuation
on:
  issues:
    types: [opened, edited] 

jobs:

  curation-comment:
    permissions:
      issues: write
    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
    container: bioconductor/bioconductor_docker:devel
    runs-on: ubuntu-latest

    steps:

      - name: Install dependencies
        run: |
         Rscript -e "install.packages(c('stringr', 'httr2'), repos = 'https://cloud.r-project.org', dependencies = c('Depends', 'Imports'))"

      - name: Get DOI
        id: get-doi
        run: |
          doi_comment <- ""
          comments <- stringr::str_split("${{ github.event.issue.body }}", "\n", simplify = TRUE)
          for (comment in comments) {
            if (stringr::str_detect(comment, "doi:")) {
              doi_comment <- comment
              break
            }  
          }
          doi <- stringr::str_split(doi_comment, ":", simplify = TRUE)[2]

          crossref <- paste("https://api.crossref.org/works", doi, sep = "/")
          crossref_resp <- httr2::request(crossref) |>
            httr2::req_perform() |>
            httr2::resp_body_json(simplifyVector = TRUE)

          title <- ifelse("title" %in% names(crossref_resp$message),
            crossref_resp$message$title,
            "")

          year <- ifelse("published" %in% names(crossref_resp$message),
            crossref_resp$message$published$`date-parts`[1],
            "")

          journal <- ifelse("container-title" %in% names(crossref_resp$message),
            crossref_resp$message["container-title"][[1]],
            "")

          author <- ""
          if ('author' %in% names(crossref_resp$message)) {
            author <- paste(crossref_resp$message$author$given[1],
                            crossref_resp$message$author$family[1],
                            sep = " ")
          }

          source <- ifelse("resource" %in% names(crossref_resp$message),
                           crossref_resp$message$resource$primary$URL,
                           "")
          
          eutils <- paste0("https://eutils.ncbi.nlm.nih.gov/entrez/eutils/",
                           "esearch.fcgi?db=pubmed&term=",
                           doi, "[DOI]&retmode=json")
          
          eutils_resp <- httr2::request(eutils) |>
            httr2::req_perform() |>
            httr2::resp_body_json(simplifyVector = TRUE)
          
          pmid <- eutils_resp$esearchresult$idlist
          system(paste0("echo DOI=", doi, " >> $GITHUB_OUTPUT"))
          system(paste0("echo AUTHOR=", author, " >> $GITHUB_OUTPUT"))
          system(paste0("echo TITLE=", title, " >> $GITHUB_OUTPUT"))
          system(paste0("echo JOURNAL=", journal, " >> $GITHUB_OUTPUT"))
          system(paste0("echo YEAR=", year, " >> $GITHUB_OUTPUT"))
          system(paste0("echo PMID=", pmid, " >> $GITHUB_OUTPUT"))
        shell: Rscript {0}

      - uses: actions/github-script@v7
        with:
          #github-token: ${{secrets.GITHUB_TOKEN}}
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: 
                `👋 Thanks for submitting!
                DOI: ${{ steps.get-doi.outputs.DOI }}
                PMID: ${{ steps.get-doi.outputs.PMID}}
                TITLE: ${{ steps.get-doi.outputs.TITLE}}
                AUTHOR: ${{ steps.get-doi.outputs.AUTHOR }}
                JOURNAL: ${{ steps.get-doi.outputs.JOURNAL}}
                YEAR: ${{ steps.get-doi.outputs.YEAR }}`
            })
